<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Oyshee Watch — Stream & Share Videos Instantly</title>
<meta name="description" content="Upload, stream, and share videos instantly. No accounts needed. Premium video hosting with shareable watch links." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0a0a0a;
    --bg-gradient: radial-gradient(ellipse at 50% 0%, #1a0a12 0%, #0a0a0a 70%);
    --card-bg: rgba(20, 10, 16, 0.5);
    --card-bg-hover: rgba(35, 15, 25, 0.65);
    --border-color: rgba(255, 255, 255, 0.07);
    --border-active: rgba(255, 20, 147, 0.5);
    --text-primary: #f3f4f6;
    --text-secondary: #9ca3af;
    --accent-primary: #ff1493;
    --accent-secondary: #ff69b4;
    --accent-gradient: linear-gradient(135deg, #ff1493 0%, #ff69b4 50%, #ff1493 100%);
    --accent-glow: rgba(255, 20, 147, 0.35);
    --success: #10b981;
    --error: #ef4444;
    --radius-lg: 16px;
    --radius-md: 10px;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg-dark);
    background-image: var(--bg-gradient);
    color: var(--text-primary);
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background orbs */
  body::before,
  body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    filter: blur(120px);
  }
  body::before {
    width: 500px;
    height: 500px;
    background: rgba(255, 20, 147, 0.08);
    top: -150px;
    right: -100px;
    animation: orbFloat 12s ease-in-out infinite alternate;
  }
  body::after {
    width: 400px;
    height: 400px;
    background: rgba(255, 105, 180, 0.06);
    bottom: -100px;
    left: -80px;
    animation: orbFloat 15s ease-in-out infinite alternate-reverse;
  }
  @keyframes orbFloat {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(40px, -30px) scale(1.15); }
  }

  .wrap {
    max-width: 1000px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* ---- Header ---- */
  header.top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 56px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.02em;
    text-decoration: none;
    background: linear-gradient(135deg, #fff 40%, #ffd6e7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo span {
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-icon {
    width: 30px;
    height: 30px;
    color: #ff1493;
    filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.6));
  }

  .manage-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-decoration: none;
    color: #fff;
    background: var(--accent-gradient);
    padding: 10px 22px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255, 20, 147, 0.3);
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }

  .manage-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
    opacity: 0;
    transition: var(--transition);
  }

  .manage-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 30px rgba(255, 20, 147, 0.45);
  }

  .manage-btn:hover::before {
    opacity: 1;
  }

  .manage-btn svg {
    width: 16px;
    height: 16px;
  }

  /* ---- Hero Section ---- */
  .hero {
    text-align: center;
    margin-bottom: 56px;
  }

  h1 {
    font-size: 48px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
  }

  h1 em {
    font-style: normal;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    position: relative;
  }

  .lede {
    color: var(--text-secondary);
    font-size: 16px;
    line-height: 1.65;
    max-width: 520px;
    margin: 0 auto 28px;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    background: rgba(255, 255, 255, 0.04);
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid var(--border-color);
  }

  .stat-num {
    color: var(--accent-primary);
    font-weight: 800;
  }

  /* ---- Gallery Header ---- */
  .gallery-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 16px;
    margin-bottom: 28px;
  }

  .gallery-head h2 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .gallery-head h2::before {
    content: '';
    width: 4px;
    height: 20px;
    background: var(--accent-gradient);
    border-radius: 100px;
    display: inline-block;
  }

  .count {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent-primary);
    background: rgba(255, 20, 147, 0.1);
    padding: 5px 14px;
    border-radius: 100px;
    border: 1px solid rgba(255, 20, 147, 0.15);
  }

  /* ---- Search Bar ---- */
  .search-bar {
    margin-bottom: 28px;
    position: relative;
  }

  .search-bar input {
    width: 100%;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    padding: 14px 16px 14px 48px;
    outline: none;
    transition: var(--transition);
  }

  .search-bar input:focus {
    border-color: var(--accent-primary);
    background: rgba(255, 20, 147, 0.03);
    box-shadow: 0 0 20px rgba(255, 20, 147, 0.1);
  }

  .search-bar input::placeholder {
    color: #4b5563;
  }

  .search-bar svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: var(--text-secondary);
    pointer-events: none;
  }

  /* ---- Gallery Grid ---- */
  #gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 22px;
  }

  .item {
    display: flex;
    flex-direction: column;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    text-decoration: none;
    color: var(--text-primary);
    transition: var(--transition);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: relative;
    overflow: hidden;
  }

  .item:hover {
    transform: translateY(-6px);
    border-color: var(--border-active);
    background: var(--card-bg-hover);
    box-shadow: 0 16px 40px rgba(255, 20, 147, 0.12), 0 0 60px rgba(255, 20, 147, 0.05);
  }

  .item::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--accent-gradient);
    opacity: 0;
    transition: var(--transition);
  }

  .item:hover::before {
    opacity: 1;
  }

  /* Video thumbnail area */
  .item-thumb {
    position: relative;
    width: 100%;
    height: 160px;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .item-thumb video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }

  .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.3);
    opacity: 0;
    transition: var(--transition);
  }

  .item:hover .play-overlay {
    opacity: 1;
  }

  .play-icon {
    width: 48px;
    height: 48px;
    background: var(--accent-gradient);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(255, 20, 147, 0.4);
    transition: var(--transition);
  }

  .item:hover .play-icon {
    transform: scale(1.1);
  }

  .play-icon svg {
    width: 20px;
    height: 20px;
    color: #fff;
    margin-left: 2px;
  }

  .item-body {
    padding: 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .item-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 16px;
    color: var(--text-primary);
    word-break: break-word;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 42px;
  }

  .item-meta {
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    padding-top: 14px;
    margin-top: auto;
  }

  .item-meta .size-badge {
    background: rgba(255, 20, 147, 0.08);
    color: var(--accent-secondary);
    padding: 3px 10px;
    border-radius: 100px;
    font-weight: 600;
    font-size: 11px;
  }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-secondary);
    background: rgba(255, 255, 255, 0.01);
    border: 1px dashed var(--border-color);
    border-radius: var(--radius-lg);
    font-size: 15px;
    font-weight: 500;
  }

  .empty-icon {
    width: 56px;
    height: 56px;
    color: rgba(255, 20, 147, 0.3);
    margin: 0 auto 16px;
  }

  .empty a {
    color: var(--accent-primary);
    text-decoration: none;
    font-weight: 700;
  }
  .empty a:hover {
    text-decoration: underline;
  }

  /* ---- Footer ---- */
  .footer {
    text-align: center;
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--border-color);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    opacity: 0.6;
  }

  @media (max-width: 640px) {
    h1 { font-size: 34px; }
    .wrap { padding: 32px 16px 60px; }
    #gallery { grid-template-columns: 1fr; }
    .stats-row { gap: 12px; }
    .stat { font-size: 12px; padding: 6px 12px; }
  }

  /* ---- Animations ---- */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .item {
    animation: fadeInUp 0.5s ease-out both;
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="top" id="header">
    <a class="logo" href="/">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7"></polygon>
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
      </svg>
      Oyshee <span>Watch</span>
    </a>
    <a class="manage-btn" href="/manage" id="manageBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Upload &amp; Manage
    </a>
  </header>

  <div class="hero">
    <h1>Your <em>Video Library</em></h1>
    <p class="lede">Stream any of your uploaded videos directly in the browser. No downloads, no conversions—just pure playback.</p>
    <div class="stats-row" id="statsRow">
      <div class="stat"><span class="stat-num" id="totalCount">0</span> Videos</div>
      <div class="stat"><span class="stat-num" id="totalSize">0 MB</span> Total</div>
    </div>
  </div>

  <div class="search-bar" id="searchBar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input type="text" id="searchInput" placeholder="Search your videos..." />
  </div>

  <div class="gallery-head">
    <h2>Streaming Gallery</h2>
    <span class="count" id="galleryCount">0 videos</span>
  </div>
  <div id="gallery"></div>

  <div class="footer">Oyshee Watch — Your videos, always available</div>

</div>

<script>
  const gallery = document.getElementById("gallery");
  const galleryCount = document.getElementById("galleryCount");
  const totalCount = document.getElementById("totalCount");
  const totalSize = document.getElementById("totalSize");
  const searchInput = document.getElementById("searchInput");

  let allVideos = [];

  function formatSize(bytes) {
    const mb = bytes / (1024 * 1024);
    if (mb < 1024) return mb.toFixed(1) + " MB";
    return (mb / 1024).toFixed(2) + " GB";
  }

  function timeAgo(iso) {
    const diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60) return "just now";
    if (diff < 3600) return Math.floor(diff / 60) + "m ago";
    if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
    if (diff < 2592000) return Math.floor(diff / 86400) + "d ago";
    if (diff < 31536000) return Math.floor(diff / 2592000) + "mo ago";
    return Math.floor(diff / 31536000) + "y ago";
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function renderGallery(videos) {
    galleryCount.textContent = videos.length ? `${videos.length} video${videos.length > 1 ? "s" : ""}` : "0 videos";

    if (!videos.length) {
      const isSearching = searchInput.value.trim().length > 0;
      gallery.innerHTML = `
        <div class="empty">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="23 7 16 12 23 17 23 7"></polygon>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
          </svg>
          <div>${isSearching
            ? "No videos match your search."
            : 'No videos uploaded yet.<br/><a href="/manage">Upload your first video →</a>'
          }</div>
        </div>`;
      return;
    }

    gallery.innerHTML = videos.map((v, i) => `
      <a class="item" href="/watch/${v.id}" style="animation-delay: ${i * 0.06}s">
        <div class="item-thumb">
          <video src="/stream/${v.id}" preload="metadata" muted></video>
          <div class="play-overlay">
            <div class="play-icon">
              <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </div>
          </div>
        </div>
        <div class="item-body">
          <span class="item-title">${escapeHtml(v.title)}</span>
          <span class="item-meta">
            <span class="size-badge">${formatSize(v.size)}</span>
            <span>${timeAgo(v.uploadedAt)}</span>
          </span>
        </div>
      </a>
    `).join("");
  }

  async function loadGallery() {
    try {
      const res = await fetch("/api/videos");
      allVideos = await res.json();

      // Update stats
      totalCount.textContent = allVideos.length;
      const totalBytes = allVideos.reduce((sum, v) => sum + v.size, 0);
      totalSize.textContent = formatSize(totalBytes);

      renderGallery(allVideos);
    } catch (e) {
      gallery.innerHTML = '<div class="empty">Could not load the gallery.</div>';
    }
  }

  // Search functionality
  searchInput.addEventListener("input", () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) {
      renderGallery(allVideos);
      return;
    }
    const filtered = allVideos.filter(v =>
      v.title.toLowerCase().includes(q) ||
      v.originalName.toLowerCase().includes(q)
    );
    renderGallery(filtered);
  });

  loadGallery();
</script>
</body>
</html>
