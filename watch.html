<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Watch Video — Oyshee Watch</title>
<meta name="description" content="Watch and share this video on Oyshee Watch. Premium streaming with no downloads required." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0a0a0a;
    --bg-gradient: radial-gradient(ellipse at 50% 0%, #1a0a12 0%, #0a0a0a 70%);
    --card-bg: rgba(20, 10, 16, 0.5);
    --border-color: rgba(255, 255, 255, 0.07);
    --border-active: rgba(255, 20, 147, 0.5);
    --text-primary: #f3f4f6;
    --text-secondary: #9ca3af;
    --accent-primary: #ff1493;
    --accent-secondary: #ff69b4;
    --accent-gradient: linear-gradient(135deg, #ff1493 0%, #ff69b4 50%, #ff1493 100%);
    --accent-glow: rgba(255, 20, 147, 0.35);
    --radius-lg: 16px;
    --radius-md: 10px;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg-dark);
    background-image: var(--bg-gradient);
    color: var(--text-primary);
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background orb */
  body::before {
    content: '';
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    filter: blur(140px);
    background: rgba(255, 20, 147, 0.06);
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    animation: orbPulse 10s ease-in-out infinite alternate;
  }

  @keyframes orbPulse {
    0% { opacity: 0.6; transform: translateX(-50%) scale(1); }
    100% { opacity: 1; transform: translateX(-50%) scale(1.2); }
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* ---- Header ---- */
  header.top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 40px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.02em;
    text-decoration: none;
    background: linear-gradient(135deg, #fff 40%, #ffd6e7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo span {
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-icon {
    width: 30px;
    height: 30px;
    color: #ff1493;
    filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.6));
  }

  .back {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-secondary);
    text-decoration: none;
    background: rgba(255, 255, 255, 0.05);
    padding: 10px 20px;
    border-radius: 100px;
    border: 1px solid var(--border-color);
    transition: var(--transition);
  }

  .back:hover {
    color: var(--text-primary);
    border-color: rgba(255, 20, 147, 0.3);
    background: rgba(255, 20, 147, 0.08);
  }

  /* ---- Video Player Stage ---- */
  .stage {
    border: 1px solid var(--border-color);
    background: #000;
    border-radius: var(--radius-lg);
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 80px rgba(255, 20, 147, 0.05);
    margin-bottom: 24px;
    transition: var(--transition);
  }

  .stage:hover {
    border-color: rgba(255, 20, 147, 0.25);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 80px rgba(255, 20, 147, 0.1);
  }

  video {
    width: 100%;
    display: block;
    max-height: 70vh;
    outline: none;
  }

  /* ---- Metadata section ---- */
  .meta-card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 32px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-color);
    flex-wrap: wrap;
    gap: 16px;
  }

  h1 {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.02em;
    flex: 1;
    min-width: 250px;
    word-break: break-word;
  }

  .meta-info {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-primary);
    background: rgba(255, 20, 147, 0.1);
    padding: 6px 14px;
    border-radius: 100px;
    white-space: nowrap;
    border: 1px solid rgba(255, 20, 147, 0.15);
  }

  .meta-details {
    display: flex;
    gap: 20px;
    padding-top: 16px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-color);
    flex-wrap: wrap;
  }

  .meta-detail {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .meta-detail svg {
    width: 14px;
    height: 14px;
    color: var(--accent-secondary);
  }

  /* ---- Sharing Link ---- */
  .share-section {
    margin-top: 24px;
  }

  .share-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 10px;
    display: block;
  }

  .share-row {
    display: flex;
    gap: 12px;
  }

  .share-row input {
    flex: 1;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 13px 14px;
    outline: none;
    text-overflow: ellipsis;
    transition: var(--transition);
  }

  .share-row input:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 15px rgba(255, 20, 147, 0.15);
  }

  .copy-btn {
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: var(--accent-gradient);
    border: none;
    border-radius: var(--radius-md);
    color: #ffffff;
    padding: 13px 24px;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: 0 4px 15px rgba(255, 20, 147, 0.25);
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }

  .copy-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
    opacity: 0;
    transition: var(--transition);
  }

  .copy-btn:hover {
    box-shadow: 0 6px 20px rgba(255, 20, 147, 0.4);
    transform: translateY(-1px);
  }

  .copy-btn:hover::before {
    opacity: 1;
  }

  .copy-btn:active {
    transform: translateY(1px);
  }

  .state-box {
    padding: 100px 0;
    text-align: center;
    color: var(--text-secondary);
    background: var(--card-bg);
    border: 1px dashed var(--border-color);
    border-radius: var(--radius-lg);
    font-size: 15px;
    font-weight: 500;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  /* ---- Animation ---- */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .stage, .meta-card {
    animation: fadeInUp 0.5s ease-out both;
  }

  .meta-card {
    animation-delay: 0.1s;
  }

  @media (max-width: 640px) {
    .wrap { padding: 32px 16px 60px; }
    .meta-card { padding: 20px; }
    .share-row { flex-direction: column; }
    .copy-btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <a class="logo" href="/">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7"></polygon>
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
      </svg>
      Oyshee <span>Watch</span>
    </a>
    <a class="back" href="/">← Back to Gallery</a>
  </header>

  <div id="content">
    <div class="state-box">Loading video details…</div>
  </div>
</div>

<script>
  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }
  function formatSize(bytes) {
    const mb = bytes / (1024 * 1024);
    if (mb < 1024) return mb.toFixed(1) + " MB";
    return (mb / 1024).toFixed(2) + " GB";
  }
  function formatDate(iso) {
    return new Date(iso).toLocaleDateString("en-US", {
      year: "numeric", month: "long", day: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
  }

  const id = window.location.pathname.split("/").pop();
  const content = document.getElementById("content");

  async function load() {
    try {
      const res = await fetch(`/api/videos/${id}`);
      if (!res.ok) {
        content.innerHTML = '<div class="state-box">This video could not be found. It may have been removed.</div>';
        return;
      }
      const video = await res.json();
      const shareUrl = window.location.href;

      // Update page title
      document.title = `${video.title} — Oyshee Watch`;

      content.innerHTML = `
        <div class="stage">
          <video controls preload="metadata" src="/stream/${video.id}"></video>
        </div>
        <div class="meta-card">
          <div class="meta-row">
            <h1>${escapeHtml(video.title)}</h1>
            <div class="meta-info">${formatSize(video.size)}</div>
          </div>
          <div class="meta-details">
            <div class="meta-detail">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
              ${formatDate(video.uploadedAt)}
            </div>
            <div class="meta-detail">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
              ${escapeHtml(video.originalName)}
            </div>
          </div>
          <div class="share-section">
            <span class="share-label">Share Watch Link</span>
            <div class="share-row">
              <input type="text" id="shareInput" readonly value="${escapeHtml(shareUrl)}" />
              <button class="copy-btn" id="copyBtn">Copy Link</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById("copyBtn").addEventListener("click", () => {
        navigator.clipboard.writeText(shareUrl).then(() => {
          const btn = document.getElementById("copyBtn");
          btn.textContent = "Copied!";
          setTimeout(() => (btn.textContent = "Copy Link"), 1500);
        });
      });
    } catch (e) {
      content.innerHTML = '<div class="state-box">Something went wrong loading this video.</div>';
    }
  }

  load();
</script>
</body>
</html>
